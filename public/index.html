<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accounts Panel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

h2 {
  margin-bottom: 15px;
}

.form {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  padding: 10px 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #4f46e5;
  color: white;
}

.accounts {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.account {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1a1a1a;
  padding: 12px;
  border-radius: 10px;
}

.online { border-left: 4px solid #22c55e; }
.offline { border-left: 4px solid #ef4444; }

.status {
  font-size: 12px;
  opacity: 0.7;
}

.actions {
  display: flex;
  gap: 8px;
}

.danger {
  background: #ef4444;
}
</style>
</head>

<body>

<div class="container">

  <h2>📱 Accounts Panel</h2>

  <div class="form">
    <input id="name" placeholder="Username">
    <input id="platform" placeholder="Platform (Instagram, TG...)">

    <select id="status">
      <option value="online">Online</option>
      <option value="offline">Offline</option>
    </select>

    <button onclick="addAccount()">Добавить</button>
  </div>

  <div class="accounts" id="list"></div>

</div>

<script>
let accounts = JSON.parse(localStorage.getItem("accounts")) || [];

function save() {
  localStorage.setItem("accounts", JSON.stringify(accounts));
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  accounts.forEach((acc, i) => {
    const div = document.createElement("div");
    div.className = `account ${acc.status}`;

    div.innerHTML = `
      <div>
        <div><b>${acc.platform}: ${acc.name}</b></div>
        <div class="status">${acc.status}</div>
      </div>

      <div class="actions">
        <button onclick="toggle(${i})">Switch</button>
        <button class="danger" onclick="removeAcc(${i})">Delete</button>
      </div>
    `;

    list.appendChild(div);
  });
}

function addAccount() {
  const name = document.getElementById("name").value;
  const platform = document.getElementById("platform").value;
  const status = document.getElementById("status").value;

  if (!name || !platform) return;

  accounts.push({ name, platform, status });

  save();
  render();
}

function removeAcc(i) {
  accounts.splice(i, 1);
  save();
  render();
}

function toggle(i) {
  accounts[i].status = accounts[i].status === "online" ? "offline" : "online";
  save();
  render();
}

render();
</script>

</body>
</html>
